# .github/workflows/vuelos-alerta.yml
#
# Corre el bot cada 6 horas. Instala Playwright y Chromium automáticamente.
# Configurar secrets en: Settings → Secrets and variables → Actions

name: Bot Alertas Vuelos Rio de Janeiro

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas
  workflow_dispatch:          # ejecución manual desde la pestaña Actions

jobs:
  alertas:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: pip install playwright

      - name: Instalar Chromium
        run: playwright install chromium --with-deps

      - name: Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:     ${{ secrets.EMAIL_RECEIVER }}
          WHATSAPP_PHONE:     ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY:    ${{ secrets.WHATSAPP_APIKEY }}
        run: python vuelos_alerta.py
